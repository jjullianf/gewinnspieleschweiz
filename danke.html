<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Danke! – GewinnspielSchweiz</title>
  <link rel="icon" href="/favicon.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --red: #D52B1E; --red-hover: #b82318; --border: #ebebeb; --text: #111; --text-muted: #666; }
    body { font-family: 'Inter', sans-serif; background: #fff; color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px 24px; }
    .icon { font-size: 64px; margin-bottom: 24px; animation: pop 0.5s ease; }
    h1 { font-size: clamp(28px, 5vw, 44px); font-weight: 800; letter-spacing: -0.02em; margin-bottom: 16px; }
    p { font-size: 16px; color: var(--text-muted); max-width: 380px; line-height: 1.6; margin-bottom: 36px; }
    .btn { display: inline-block; background: var(--red); color: #fff; font-family: 'Inter', sans-serif; font-weight: 700; font-size: 15px; padding: 13px 28px; border-radius: 12px; text-decoration: none; margin: 8px; transition: background 0.2s; }
    .btn:hover { background: var(--red-hover); }
    .btn-ghost { background: transparent; border: 1.5px solid var(--border); color: var(--text-muted); }
    .btn-ghost:hover { background: #f9f9f9; border-color: #ccc; }
    .footer-links { margin-top: 48px; font-size: 12px; color: #ccc; }
    .footer-links a { color: #ccc; text-decoration: none; margin: 0 8px; }
    .footer-links a:hover { color: var(--red); }
    @keyframes pop { 0% { transform: scale(0.5); opacity: 0; } 80% { transform: scale(1.1); } 100% { transform: scale(1); opacity: 1; } }
  </style>
</head>
<body>
  <div class="icon">🎉</div>
  <h1>Du bist dabei!</h1>
  <p>Perfekt – du wirst als Erstes informiert und erhältst die besten Schweizer Gewinnspiele direkt ins Postfach.</p>
  <div>
    <a class="btn" href="/">Gewinnspiele entdecken</a>
    <a class="btn btn-ghost" href="https://instagram.com/gewinnspieleschweiz" target="_blank">@gewinnspieleschweiz</a>
  </div>
  <div class="footer-links">
    <a href="/impressum.html">Impressum</a>
    <a href="/datenschutz.html">Datenschutz</a>
  </div>
</body>
</html>
